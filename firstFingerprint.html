<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>首次开启指纹识别</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { min-height: 100vh; background: #fff8f6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
    .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; font-size: 24px; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; word-wrap: normal; direction: ltr; -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased; }
    .serif { font-family: 'Noto Serif SC', 'Source Han Serif CN', 'STSongti SC', 'SimSun', serif; }
    main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 48px 24px 128px; }
    .container { width: 100%; max-width: 320px; margin: 0 auto; }
    .icon-wrap { width: 80px; height: 80px; border-radius: 50%; background: #f7ddd5; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
    .icon-wrap .material-symbols-outlined { font-size: 48px; color: #ab3500; }
    h2 { font-size: 28px; color: #261814; text-align: center; margin: 16px 0 8px; font-weight: 600; }
    p { font-size: 16px; color: #594139; text-align: center; max-width: 280px; margin: 0 auto 32px; line-height: 1.6; }
    .input-wrap { position: relative; margin-bottom: 16px; }
    .input-icon { position: absolute; top: 0; left: 0; bottom: 0; display: flex; align-items: center; padding-left: 16px; pointer-events: none; }
    .input-icon .material-symbols-outlined { color: #8d7168; font-size: 20px; }
    input { width: 100%; padding: 16px 16px 16px 44px; background: rgba(255,255,255,0.8); border: 1px solid #e1bfb5; border-radius: 9999px; font-size: 16px; color: #261814; outline: none; backdrop-filter: blur(4px); box-shadow: 0 2px 8px rgba(0,0,0,0.05); font-family: inherit; }
    input::placeholder { color: rgba(89,65,57,0.5); }
    input:focus { border-color: #6d5b46; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .pwd-wrap { position: relative; }
    .pwd-wrap input { padding-right: 48px; }
    .pwd-toggle { position: absolute; top: 0; right: 0; bottom: 0; display: flex; align-items: center; padding-right: 16px; color: #8d7168; }
    .submit-btn { width: 100%; padding: 16px; background: #ff6b35; color: white; border: none; border-radius: 9999px; font-size: 16px; font-weight: 600; box-shadow: 0 4px 14px rgba(255,107,53,0.39); cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 32px; }
    .submit-btn:hover { background: #ff7b4b; box-shadow: 0 6px 20px rgba(255,107,53,0.23); }
    .submit-btn:active { transform: scale(0.98); }
    .skip { margin-top: 16px; text-align: center; }
    .skip a { font-size: 12px; color: #594139; text-decoration: none; letter-spacing: 0.05em; font-weight: 600; }
    .skip a:hover { color: #ab3500; }
</style>
</head>
<body>
<main>
<div class="container">
<div class="icon-wrap"><span class="material-symbols-outlined">fingerprint</span></div>
<h2 class="serif">开启指纹识别</h2>
<p class="serif">为了保障您的资产安全，请验证身份以开启指纹登录</p>
<form>
<div class="input-wrap">
<div class="input-icon"><span class="material-symbols-outlined">person</span></div>
<input placeholder="用户名" type="text"/>
</div>
<div class="input-wrap pwd-wrap">
<div class="input-icon"><span class="material-symbols-outlined">lock</span></div>
<input placeholder="密码" type="password"/>
<div class="pwd-toggle"><span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span></div>
</div>
</form>
<button class="submit-btn serif" onclick="navigateTo('fingerprint')">
<span>去验证指纹</span>
<span class="material-symbols-outlined" style="font-size: 20px;">arrow_forward</span>
</button>
<div class="skip">
<a href="#" class="serif">跳过，以后再说</a>
</div>
</div>
</main>
<script>
function navigateTo(page) { window.location.href = page + '.html'; }
</script>
</body>
</html>

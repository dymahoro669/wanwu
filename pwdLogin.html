<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>用户名密码登录 - 万物</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Source+Han+Serif+SC:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
    .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: 'liga';
        -webkit-font-smoothing: antialiased;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { position: fixed; inset: 0; background: transparent; padding-top: env(safe-area-inset-top); }
    main { background: transparent; }
    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: 1;
        pointer-events: none;
    }
</style>
</head>
<body>
<div class="overlay"></div>
<div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.25); z-index: 2; pointer-events: none;"></div>
<!-- Main Content -->
<main class="relative w-full h-screen flex flex-col justify-center items-center px-6 z-10">
<!-- Header -->
<header class="text-center mb-10">
<h2 class="mb-1" style="font-family: 'Source Han Serif SC', 'Times New Roman', serif; font-size: 21px; font-weight: 400; color: #3D2008;">
        欢迎回到
    </h2>
<h1 style="font-family: 'Source Han Serif SC', 'Times New Roman', serif; font-size: 42px; font-weight: 700; color: #3D2008; letter-spacing: -0.5px;">
        万物
    </h1>
</header>
<!-- Form -->
<form class="w-full max-w-[320px] flex flex-col gap-4">
<!-- Username -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined" style="font-size: 20px; color: #3D2008;">person</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-white/90 rounded-xl border-none focus:ring-2 focus:ring-[#FF6600] text-[16px] text-[#333333] placeholder-[#999999] transition-colors shadow-sm" style="font-family: 'Manrope', sans-serif;" placeholder="用户名" type="text"/>
</div>
<!-- Password -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined" style="font-size: 20px; color: #3D2008;">lock</span>
</div>
<input class="w-full pl-12 pr-12 py-4 bg-white/90 rounded-xl border-none focus:ring-2 focus:ring-[#FF6600] text-[16px] text-[#333333] placeholder-[#999999] transition-colors shadow-sm" style="font-family: 'Manrope', sans-serif;" placeholder="密码" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center" style="color: #3D2008;" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</form>
<!-- Hint Text -->
<div class="text-center mt-4 mb-6" style="font-family: 'Source Han Serif SC', 'Times New Roman', serif; font-size: 12px; font-weight: 300; color: #3D2008;">
        注册账号、忘记密码都可联系管理员哦
    </div>
<!-- Login Button -->
<button onclick="top.loadPage('home');top.showBottomNav();" class="w-full max-w-[320px] mx-auto py-4 rounded-xl bg-[#FF6600] text-white text-[16px] font-bold shadow-[0_4px_14px_rgba(255,102,0,0.3)] hover:bg-[#FF8533] transition-all duration-300 ease-in-out active:scale-[0.98]" style="font-family: 'Noto Sans SC', sans-serif;">
        立即登录
    </button>
<!-- Fingerprint Option -->
<div class="mt-8 flex flex-col items-center">
<button onclick="top.loadPage('fingerprint');" class="flex flex-col items-center gap-2 group">
<div class="w-12 h-12 rounded-full bg-white/90 flex items-center justify-center group-hover:scale-105 transition-transform shadow-sm">
<span class="material-symbols-outlined text-2xl text-[#FF6600]">fingerprint</span>
</div>
<span style="font-family: 'Source Han Serif SC', 'Times New Roman', serif; font-size: 12px; font-weight: 300; color: #3D2008;">指纹识别登录</span>
</button>
</div>
</main>
</body>
</html>

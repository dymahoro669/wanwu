<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>指纹识别 - 万物</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: 'liga';
        -webkit-font-smoothing: antialiased;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { position: fixed; inset: 0; background: transparent; padding-top: env(safe-area-inset-top); }
    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: 1;
        pointer-events: none;
    }
</style>
</head>
<body>
<div class="overlay"></div>
<div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.25); z-index: 2; pointer-events: none;"></div>
<!-- Main Content -->
<main style="width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2;">
<!-- Header -->
<header style="margin-top: 80px; display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center;">
<h2 style="font-family: 'Source Han Serif SC', 'Times New Roman', serif; font-size: 21px; font-weight: 400; color: #3D2008;">
        欢迎回到
    </h2>
<h1 style="font-family: 'Source Han Serif SC', 'Times New Roman', serif; font-size: 42px; font-weight: 700; color: #3D2008; letter-spacing: -0.5px;">
        万物
    </h1>
</header>
<!-- Fingerprint Section -->
<section style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; gap: 32px;">
<!-- Fingerprint Button -->
<div onclick="top.loadPage('home');top.showBottomNav();" style="position: relative; cursor: pointer;">
<!-- Outer glow -->
<div style="position: absolute; inset: 0; background: rgba(211,47,47,0.2); border-radius: 50%; filter: blur(20px);"></div>
<!-- Inner circle -->
<div style="position: relative; width: 96px; height: 96px; border-radius: 50%; background: rgba(255,255,255,0.95); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 32px rgba(0,0,0,0.2);">
<span class="material-symbols-outlined" style="color: #D32F2F; font-size: 56px;">
                fingerprint
            </span>
</div>
</div>
<!-- Text -->
<p style="font-family: 'Noto Serif SC', serif; font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.8); text-align: center; max-width: 250px;">
        请验证指纹以登录
    </p>
</section>
<!-- Footer -->
<footer style="padding-bottom: 48px;">
<button onclick="top.loadPage('login')" style="font-family: 'Noto Serif SC', serif; font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.8); background: none; border: 1px solid rgba(255,255,255,0.8); border-radius: 20px; cursor: pointer; padding: 10px 28px;">
        用户名密码登录
    </button>
</footer>
</main>
</body>
</html>

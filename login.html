<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>登录 - 万物</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { position: fixed; inset: 0; background: linear-gradient(to bottom, #E8D5C4, #F5F1ED); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
    .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; font-size: 24px; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; word-wrap: normal; direction: ltr; -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased; }
    .serif { font-family: 'Noto Serif SC', 'Source Han Serif CN', 'STSongti SC', 'SimSun', serif; }
    main { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 24px; }
    header { text-align: center; margin-bottom: 40px; }
    h2 { font-size: 14px; color: #666666; margin-bottom: 4px; font-weight: 400; }
    h1 { font-size: 28px; color: #333333; letter-spacing: -0.5px; font-weight: 700; }
    form { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 16px; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; top: 0; left: 0; bottom: 0; display: flex; align-items: center; padding-left: 16px; pointer-events: none; }
    .input-icon .material-symbols-outlined { color: #999999; font-size: 20px; }
    input { width: 100%; padding: 16px 16px 16px 48px; background: white; border: none; border-radius: 12px; font-size: 16px; color: #333333; outline: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); font-family: 'Manrope', sans-serif; }
    input::placeholder { color: #999999; }
    .pwd-wrap input { padding-right: 48px; }
    .pwd-toggle { position: absolute; top: 0; right: 0; bottom: 0; display: flex; align-items: center; padding-right: 16px; background: none; border: none; cursor: pointer; color: #999999; }
    .hint { text-align: center; font-size: 12px; color: #999999; margin-top: 16px; margin-bottom: 24px; font-weight: 300; }
    .login-btn { width: 100%; max-width: 320px; padding: 16px; background: #FF5722; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; box-shadow: 0 4px 14px rgba(255,87,34,0.3); transition: all 0.3s; }
    .login-btn:hover { background: #f55626; }
    .login-btn:active { transform: scale(0.98); }
    .fingerprint { margin-top: 32px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .fingerprint-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; }
    .fingerprint-icon { width: 48px; height: 48px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s; }
    .fingerprint-icon .material-symbols-outlined { color: #FF5722; font-size: 24px; }
    .fingerprint-btn:hover .fingerprint-icon { transform: scale(1.05); }
    .fingerprint-text { font-size: 12px; color: #999999; font-weight: 300; }
</style>
</head>
<body>
<main>
<header>
<h2 class="serif">欢迎回到</h2>
<h1 class="serif">万物</h1>
</header>
<form>
<div class="input-wrap">
<div class="input-icon"><span class="material-symbols-outlined">person</span></div>
<input placeholder="用户名" type="text"/>
</div>
<div class="input-wrap pwd-wrap">
<div class="input-icon"><span class="material-symbols-outlined">lock</span></div>
<input placeholder="密码" type="password"/>
<button class="pwd-toggle" type="button"><span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span></button>
</div>
</form>
<div class="hint serif">注册账号、忘记密码都可联系管理员哦</div>
<button class="login-btn serif" onclick="navigateTo('home')">立即登录</button>
<div class="fingerprint">
<button class="fingerprint-btn" onclick="navigateTo('fingerprint')">
<div class="fingerprint-icon"><span class="material-symbols-outlined">fingerprint</span></div>
<span class="fingerprint-text serif">指纹识别登录</span>
</button>
</div>
</main>
<script>
function navigateTo(page) { window.location.href = page + '.html'; }
</script>
</body>
</html>

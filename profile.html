<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>个人中心 - 万物</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
svg { display: inline-block; vertical-align: middle; }
.serif { font-family: 'Noto Serif SC', 'Source Han Serif CN', 'STSongti SC', 'SimSun', serif; }
.sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Manrope', sans-serif; }

:root {
  --primary: #ab3500;
  --primary-container: #ff6b35;
  --on-primary: #ffffff;
  --on-primary-container: #5f1900;
  --secondary: #6d5b46;
  --surface-container: #ffe9e3;
  --surface-container-lowest: #ffffff;
  --surface-container-low: #fff1ed;
  --surface-container-high: #fde3db;
  --surface-dim: #eed5cd;
  --background: #fff8f6;
  --on-background: #261814;
  --on-surface: #261814;
  --on-surface-variant: #594139;
  --outline: #8d7168;
  --outline-variant: #e1bfb5;
  --tertiary: #00677e;
  --tertiary-fixed: #b5ebff;
  --secondary-fixed-dim: #dbc3a8;
  --secondary-fixed: #f8dec3;
}

body { min-height: max(884px, 100dvh); background: var(--background); font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding-bottom: 128px; color: var(--on-surface); }

header { position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: #fffef9; border-bottom: 1px solid rgba(225,191,181,0.5); z-index: 40; }
.header-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background-color 0.15s; }
.header-btn:hover { background: rgba(0,0,0,0.05); }
.header-btn svg { width: 20px; height: 20px; fill: var(--on-surface); }
.header-title { font-size: 18px; font-weight: 600; color: var(--on-surface); font-family: 'Noto Serif SC', serif; }

main { max-width: 448px; margin: 0 auto; padding: 24px 24px; display: flex; flex-direction: column; gap: 32px; }

.section-title { font-size: 18px; font-weight: 600; color: var(--on-surface); margin-bottom: 16px; font-family: 'Noto Serif SC', serif; }

/* User Profile Card */
.profile-card { background: var(--surface-container-lowest); border-radius: 8px; padding: 24px; box-shadow: 0 4px 20px rgba(109,91,70,0.08); border: 1px solid rgba(225,191,181,0.3); }
.profile-header { display: flex; gap: 16px; margin-bottom: 16px; }
.profile-avatar { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 2px solid var(--surface-container); }
.profile-info { flex: 1; }
.profile-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.profile-name { font-size: 24px; font-weight: 600; color: var(--on-surface); font-family: 'Noto Serif SC', serif; }
.profile-dept { font-size: 10px; padding: 2px 6px; background: var(--surface-container); color: var(--on-surface-variant); border-radius: 4px; }
.profile-role { font-size: 12px; padding: 2px 8px; background: var(--primary-container); color: var(--on-primary); border-radius: 9999px; font-weight: 600; margin-left: auto; }

/* Level Progress */
.level-section { margin-top: 12px; }
.level-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.level-icon { width: 16px; height: 16px; fill: var(--primary-container); }
.level-current { font-size: 12px; font-weight: 600; color: var(--on-surface-variant); }
.level-next { font-size: 12px; font-weight: 600; color: var(--on-surface-variant); margin-left: auto; }
.level-bar { width: 100%; height: 8px; background: var(--surface-container-high); border-radius: 9999px; overflow: hidden; }
.level-fill { height: 100%; background: var(--primary-container); border-radius: 9999px; width: 52.5%; }
.level-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--on-surface-variant); margin-top: 4px; }
.level-percent { font-size: 12px; color: var(--primary-container); font-weight: 600; }

/* Activity Feed */
.activity-feed { margin-top: 12px; background: var(--surface-container); border-radius: 4px; padding: 8px; overflow: hidden; height: 32px; }
.activity-track { display: flex; flex-direction: column; animation: scroll 10s linear infinite; width: 100%; }
.activity-item { height: 32px; display: flex; align-items: center; justify-content: space-between; padding: 0 8px; font-size: 10px; color: var(--on-surface-variant); opacity: 0.8; flex-shrink: 0; }
.activity-item span:first-child { flex: 1; }
.activity-item span:nth-child(2) { margin-right: 8px; }
.activity-item .points { color: var(--primary-container); font-weight: 600; }
@keyframes scroll { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

/* Benefits Card */
.benefits-card { background: var(--surface-container-lowest); border-radius: 8px; padding: 16px; margin-top: 16px; border: 1px solid var(--surface-container-highest); }
.benefits-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.benefits-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--on-surface); }
.benefits-title svg { width: 18px; height: 18px; fill: var(--primary-container); }
.benefits-link { font-size: 12px; color: var(--primary-container); display: flex; align-items: center; gap: 2px; cursor: pointer; }
.benefits-link svg { width: 14px; height: 14px; fill: var(--primary-container); }
.benefits-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.benefit-item { background: var(--surface-container-lowest); padding: 8px; border-radius: 4px; border: 1px solid var(--surface-container); }
.benefit-item.next { opacity: 0.8; }
.benefit-label { font-size: 12px; color: var(--on-surface-variant); margin-bottom: 4px; }
.benefit-value { font-size: 14px; font-weight: 500; color: var(--on-surface); }
.benefit-value.highlight { color: var(--primary); }

/* Stats Grid */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.stat-card { background: var(--surface-container-lowest); border-radius: 8px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; box-shadow: 0 4px 20px rgba(109,91,70,0.08); border: 1px solid rgba(225,191,181,0.3); cursor: pointer; transition: background-color 0.2s; }
.stat-card:hover { background: var(--surface-container-low); }
.stat-icon { width: 32px; height: 32px; fill: var(--primary-container); }
.stat-value { font-size: 20px; font-weight: 600; color: var(--on-surface); font-family: 'Noto Serif SC', serif; }
.stat-label { font-size: 12px; color: var(--on-surface-variant); }

/* Stats Grid 2 cols */
.stats-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.stat-card-2 { background: var(--surface-container-lowest); border-radius: 8px; padding: 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; box-shadow: 0 4px 20px rgba(109,91,70,0.08); border: 1px solid rgba(225,191,181,0.3); cursor: pointer; transition: background-color 0.2s; }
.stat-card-2:hover { background: var(--surface-container-low); }
.stat-card-2 .stat-icon { width: 32px; height: 32px; fill: var(--primary-container); }
.stat-card-2 .stat-value { font-size: 20px; font-weight: 600; color: var(--on-surface); font-family: 'Noto Serif SC', serif; }
.stat-card-2 .stat-label { font-size: 12px; color: var(--on-surface-variant); }

/* Services List */
.services-card { background: var(--surface-container-lowest); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(109,91,70,0.08); border: 1px solid rgba(225,191,181,0.3); }
.services-title { font-size: 14px; font-weight: 600; color: var(--on-surface); padding: 16px; border-bottom: 1px solid var(--surface-container-high); font-family: 'Noto Serif SC', serif; }
.service-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--surface-container-high); cursor: pointer; transition: background-color 0.2s; }
.service-item:last-child { border-bottom: none; }
.service-item:hover { background: var(--surface-container-low); }
.service-left { display: flex; align-items: center; gap: 12px; }
.service-icon { width: 20px; height: 20px; fill: var(--on-surface-variant); }
.service-name { font-size: 16px; color: var(--on-surface); }
.service-arrow { width: 16px; height: 16px; fill: var(--on-surface-variant); }

.bottom-nav { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 448px; background: var(--surface-container-lowest); border-radius: 32px; overflow: hidden; box-shadow: 0 8px 30px rgba(109,91,70,0.12); z-index: 100; }
.nav-inner { display: flex; justify-content: space-around; align-items: center; height: 64px; padding: 0 8px; }
.nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 64px; padding: 0 32px; border-radius: 9999px; cursor: pointer; transition: all 0.2s; background: transparent; border: none; color: var(--on-surface-variant); }
.nav-btn.active { background: var(--primary-container); color: var(--on-primary); }
.nav-btn:not(.active):hover { background: var(--surface-container-low); }
.nav-btn:active { transform: scale(0.9); }
.nav-btn svg { width: 24px; height: 24px; }
.nav-btn span { font-size: 10px; font-weight: 600; margin-top: 4px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; text-transform: uppercase; letter-spacing: 0.05em; }
</style>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>开启快捷登录 - 万物资产交易中心</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { min-height: 100vh; background: #fff8f6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
    .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-weight: normal; font-style: normal; font-size: 24px; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; word-wrap: normal; direction: ltr; -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased; }
    .serif { font-family: 'Noto Serif SC', 'Source Han Serif CN', 'STSongti SC', 'SimSun', serif; }
    main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 48px 24px; position: relative; overflow: hidden; }
    .bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    .bg-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(255,248,246,0.4), rgba(255,248,246,0.8), rgba(255,248,246,1)); backdrop-filter: blur(2px); z-index: 1; }
    .content { width: 100%; max-width: 320px; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 10; padding: 48px 0; }
    .icon-wrap { width: 128px; height: 128px; border-radius: 50%; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 32px rgba(109,91,70,0.15); margin-bottom: 48px; position: relative; }
    .icon-wrap::after { content: ''; position: absolute; inset: 8px; border-radius: 50%; border: 1px solid #f7ddd5; opacity: 0.5; }
    .icon-wrap .material-symbols-outlined { font-size: 64px; color: #ff6b35; }
    h1 { font-size: 28px; color: #261814; text-align: center; margin-bottom: 8px; font-weight: 600; }
    p { font-size: 16px; color: #594139; text-align: center; line-height: 1.6; margin-bottom: 48px; }
    .btn-primary { width: 100%; padding: 16px; background: #ff6b35; color: white; border: none; border-radius: 9999px; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 4px 12px rgba(255,107,53,0.2); cursor: pointer; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { width: 100%; padding: 16px; background: transparent; color: #594139; border: none; border-radius: 9999px; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; cursor: pointer; transition: background 0.2s; margin-top: 16px; }
    .btn-secondary:hover { background: rgba(247,221,213,0.5); }
</style>
</head>
<body>
<main>
<img class="bg-img" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqVRPyxaQTkKNDKKaFCqRgvoBk6PZU4cSbqozmS7FLaEqTVUTT2ABf9JmUIbYFblVmp9k8H8EzbMTTJH_7MGyYyMJ9_0fbmia9vC1Lw036u5r-ksUEJOP5H_mu3yeSAeURVJSiqv7wxNA7IKT_evcLAOdVP23KQhn3bG4Ow1eKPAYpEbmZaHOFprQlTtGleovr2ODZellj2EzOWsqVPZoN8o7IVVtIoHm35ImEH4kFoWnv5-MkWw-OyS66YIciIWfF4HAU-5PKgMQ" alt=""/>
<div class="bg-overlay"></div>
<div class="content">
<div class="icon-wrap"><span class="material-symbols-outlined">fingerprint</span></div>
<h1 class="serif">开启快捷登录</h1>
<p class="serif">启用生物识别（指纹识别或faceID），让每次访问万物资产交易中心都安全又便捷。</p>
<button class="btn-primary serif" onclick="navigateTo('fingerprint')">立即开启</button>
<button class="btn-secondary serif" onclick="navigateTo('home')">稍后再说</button>
</div>
</main>
<script>
function navigateTo(page) { window.location.href = page + '.html'; }
</script>
</body>
</html>

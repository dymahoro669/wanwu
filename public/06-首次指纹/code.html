          font-variation-settings:

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-transparent text-on-surface min-h-screen flex flex-col font-body-lg">
<!-- Background removed - video plays in parent container -->
<!-- TopAppBar -->
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col justify-center items-center px-container-padding pb-32 pt-12">
<div class="w-full max-w-md mx-auto">
<div class="text-center mb-section-gap">
<div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-surface-container-highest mb-gutter shadow-[0_8px_30px_rgb(0,0,0,0.05)]">
<span class="material-symbols-outlined text-5xl text-primary" data-icon="fingerprint">fingerprint</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-unit mt-gutter">开启指纹识别</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">为了保障您的资产安全，请验证身份以开启指纹登录</p>
</div>
<!-- Card Container -->
<div class="mb-section-gap">
<form class="flex flex-col gap-gutter">
<div>
<label class="sr-only" for="username">用户名</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant" data-icon="person">person</span>
</div>
<input class="w-full pl-11 pr-4 py-4 bg-surface text-on-surface border border-outline-variant rounded-full focus:ring-1 focus:ring-secondary focus:border-secondary font-body-md text-body-md placeholder-on-surface-variant/50 transition-colors bg-white/80 backdrop-blur-sm shadow-sm" id="username" name="username" placeholder="用户名" type="text"/>
</div>
</div>
<div>
<label class="sr-only" for="password">密码</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant" data-icon="lock">lock</span>
</div>
<input class="w-full pl-11 pr-4 py-4 bg-surface text-on-surface border border-outline-variant rounded-full focus:ring-1 focus:ring-secondary focus:border-secondary font-body-md text-body-md placeholder-on-surface-variant/50 transition-colors bg-white/80 backdrop-blur-sm shadow-sm" id="password" name="password" placeholder="密码" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center">
<button class="text-outline-variant hover:text-on-surface-variant focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
</div>
</form>
</div>
<button class="w-full py-4 rounded-full bg-primary-container text-on-primary font-body-lg text-body-lg font-semibold shadow-[0_4px_14px_0_rgb(255,107,53,0.39)] hover:shadow-[0_6px_20px_rgba(255,107,53,0.23)] hover:bg-[#ff7b4b] transition-all duration-300 ease-in-out active:scale-[0.98] flex items-center justify-center gap-2">
<span>去验证指纹</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="mt-gutter text-center">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">跳过，以后再说</a>
</div>
</div>

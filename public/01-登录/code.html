<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>登录 - 万物</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: 'liga';
        -webkit-font-smoothing: antialiased;
    }
    input::placeholder { color: #999999; }
</style>
</head>
<body style="position: fixed; inset: 0; background: linear-gradient(to bottom, #E8D5C4, #F5F1ED); overflow: hidden;">
<!-- Main Content -->
<main style="width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 24px;">
<!-- Header -->
<header style="text-align: center; margin-bottom: 40px;">
<h2 style="font-family: 'Noto Serif SC', serif; font-size: 14px; font-weight: 400; color: #666666; margin-bottom: 4px;">
        欢迎回到
    </h2>
<h1 style="font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 700; color: #333333; letter-spacing: -0.5px;">
        万物
    </h1>
</header>
<!-- Form -->
<form style="width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 16px;">
<!-- Username -->
<div style="position: relative;">
<div style="position: absolute; top: 0; left: 0; bottom: 0; display: flex; align-items: center; padding-left: 16px; pointer-events: none;">
<span class="material-symbols-outlined" style="color: #999999; font-size: 20px;">person</span>
</div>
<input style="width: 100%; padding: 16px 16px 16px 48px; background: white; border: none; border-radius: 12px; font-size: 16px; color: #333333; outline: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08);" placeholder="用户名" type="text"/>
</div>
<!-- Password -->
<div style="position: relative;">
<div style="position: absolute; top: 0; left: 0; bottom: 0; display: flex; align-items: center; padding-left: 16px; pointer-events: none;">
<span class="material-symbols-outlined" style="color: #999999; font-size: 20px;">lock</span>
</div>
<input style="width: 100%; padding: 16px 48px 16px 48px; background: white; border: none; border-radius: 12px; font-size: 16px; color: #333333; outline: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08);" placeholder="密码" type="password"/>
<button style="position: absolute; top: 0; right: 0; bottom: 0; display: flex; align-items: center; padding-right: 16px; background: none; border: none; cursor: pointer; color: #999999;" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</form>
<!-- Hint Text -->
<div style="text-align: center; font-family: 'Noto Serif SC', serif; font-size: 12px; font-weight: 300; color: #999999; margin-top: 16px; margin-bottom: 24px;">
        注册账号、忘记密码都可联系管理员哦
    </div>
<!-- Login Button -->
<button onclick="top.loadPage('home');top.showBottomNav();" style="width: 100%; max-width: 320px; padding: 16px; background: #FF5722; color: white; border: none; border-radius: 12px; font-family: 'Noto Serif SC', serif; font-size: 16px; font-weight: 500; cursor: pointer; box-shadow: 0 4px 14px rgba(255,87,34,0.3);">
        立即登录
    </button>
<!-- Fingerprint Option -->
<div style="margin-top: 32px; display: flex; flex-direction: column; align-items: center; gap: 8px;">
<button onclick="top.loadPage('fingerprint');" style="display: flex; flex-direction: column; align-items: center; gap: 8px; background: none; border: none; cursor: pointer;">
<div style="width: 48px; height: 48px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
<span class="material-symbols-outlined" style="color: #FF5722; font-size: 24px;">fingerprint</span>
</div>
<span style="font-family: 'Noto Serif SC', serif; font-size: 12px; font-weight: 300; color: #999999;">指纹识别登录</span>
</button>
</div>
</main>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
    <meta name="theme-color" content="#fff8f6">
    <title>万物 - Everything</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: #fff8f6; font-family: 'Manrope', sans-serif; }
        .font-serif { font-family: 'Noto Serif SC', serif; }
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-size: 24px;
            display: inline-block;
            -webkit-font-smoothing: antialiased;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#fff8f6]">
    <!-- 启动画面 -->
    <div id="splash" class="fixed inset-0 z-50 flex flex-col justify-between items-center bg-[#fff8f6]">
        <div class="flex-1"></div>
        <div class="flex flex-col items-center space-y-4">
            <h1 class="font-serif text-5xl font-bold text-[#261814] tracking-widest">万物</h1>
            <h2 class="text-xl text-[#594139] opacity-90">Everything</h2>
        </div>
        <div class="flex-1"></div>
        <p class="pb-12 text-xs text-[#594139] opacity-70 tracking-widest">万物皆资产 · 惠及你我他</p>
    </div>

    <!-- 持久视频背景 -->
    <video id="bgVideo" autoplay loop muted playsinline class="fixed inset-0 w-full h-full object-cover z-[-2]" poster="">
        <source src="bg-video.mp4" type="video/mp4">
    </video>
    <!-- 视频遮罩层 -->
    <div id="videoOverlay" class="fixed inset-0 bg-gradient-to-b from-black/30 via-black/20 to-black/50 z-[-1]"></div>

    <!-- 页面容器 -->
    <div id="page-container" class="hidden min-h-screen pb-24"></div>

    <!-- 底部导航 -->
    <nav id="bottomNav" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md rounded-[32px] z-50 bg-[#0A0A0A] shadow-lg">
        <div class="flex justify-around items-center h-16">
            <button onclick="loadPage('home')" class="nav-btn flex flex-col items-center text-stone-400 py-2 px-6">
                <span class="material-symbols-outlined">token</span>
                <span class="text-[10px] font-medium uppercase tracking-wider mt-1">资产</span>
            </button>
            <button onclick="loadPage('data')" class="nav-btn flex flex-col items-center text-stone-400 py-2 px-6">
                <span class="material-symbols-outlined">analytics</span>
                <span class="text-[10px] font-medium uppercase tracking-wider mt-1">数据</span>
            </button>
            <button onclick="loadPage('profile')" class="nav-btn flex flex-col items-center text-stone-400 py-2 px-6">
                <span class="material-symbols-outlined">person</span>
                <span class="text-[10px] font-medium uppercase tracking-wider mt-1">我的</span>
            </button>
        </div>
    </nav>

    <script>
        const pages = {
            'login': 'android/code.html',
            'home': '_6/code.html',
            'assetDetail': '_5/code.html',
            'profile': '_3/code.html',
            'data': '_4/code.html'
        };

        function updateNav(page) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-[#FF6B35]', 'text-white');
                btn.classList.add('text-stone-400');
            });
            const active = document.querySelector(`[onclick="loadPage('${page}')"]`);
            if (active) {
                active.classList.add('bg-[#FF6B35]', 'text-white');
                active.classList.remove('text-stone-400');
            }
        }

        async function loadPage(name) {
            const path = pages[name];
            if (!path) return;
            try {
                const res = await fetch(path);
                const html = await res.text();
                document.getElementById('page-container').innerHTML = html;
                document.title = html.match(/<title>(.*?)<\/title>/i)?.[1] || '万物';
            } catch (e) { console.error(e); }
            updateNav(name);
        }

        // 启动
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            document.getElementById('splash').style.transition = 'opacity 0.8s';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('page-container').classList.remove('hidden');
                document.getElementById('bottomNav').classList.remove('hidden');
                loadPage('home');
            }, 800);
        }, 2000);

        window.loadPage = loadPage;
    </script>
</body>
</html>
